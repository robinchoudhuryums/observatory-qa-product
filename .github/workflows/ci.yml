name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npm run check

      - name: Run tests
        run: npm test
        env:
          SESSION_SECRET: ci-test-secret
          ASSEMBLYAI_API_KEY: test-key

      - name: Build
        run: npm run build
