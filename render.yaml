# Render.com deployment configuration
# See: https://docs.render.com/infrastructure-as-code

services:
  - type: web
    name: observatory-qa
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: STORAGE_BACKEND
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: observatory-qa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: observatory-qa-redis
          type: redis
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET
        sync: false

  - type: worker
    name: observatory-qa-workers
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/workers.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: observatory-qa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: observatory-qa-redis
          type: redis
          property: connectionString
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET
        sync: false

  - type: redis
    name: observatory-qa-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: observatory-qa-db
    plan: starter
    postgresMajorVersion: "16"
    ipAllowList: []
